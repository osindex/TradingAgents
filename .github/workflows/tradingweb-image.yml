name: Build TradingAgents images

on:
  push:
    branches:
      - main
      - cli
    tags:
      - "v*"
    paths:
      - "TradingWeb/**"
      - "tradingagents/**"
      - "cli/**"
      - "pyproject.toml"
      - "uv.lock"
      - "docker-compose.web.yml"
      - ".dockerignore"
      - ".github/workflows/tradingweb-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-cli-image:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/cli'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (cli)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/osindex/tradingagents-cli
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=cli,enable={{is_default_branch}}

      - name: Build and push (cli)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: TradingWeb/Dockerfile
          target: cli
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web-image:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/osindex/tradingagents-tradingweb
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (web)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: TradingWeb/Dockerfile
          target: web
          # Reuse the already-published cli image as the web base (B-2):
          # this skips rebuilding the TradingAgents core and re-running
          # `pip install .`, so web/tag builds are fast.
          build-args: |
            CLI_IMAGE=${{ env.REGISTRY }}/osindex/tradingagents-cli:cli
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
