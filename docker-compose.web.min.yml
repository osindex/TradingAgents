services:
  tradingweb:
    image: ${TRADINGWEB_IMAGE:-ghcr.io/osindex/tradingagents-tradingweb:main}
    ports:
      - "8731:8731"
    environment:
      TRADINGWEB_USERS: ${TRADINGWEB_USERS:-admin:admin}
      TRADINGWEB_SECRET: ${TRADINGWEB_SECRET:-change-me-in-production}
    volumes:
      - tradingweb_data:/home/appuser/.tradingweb
      - tradingagents_data:/home/appuser/.tradingagents
    restart: unless-stopped

volumes:
  tradingweb_data:
  tradingagents_data:
