services:
  tradingcli:
    image: ${TRADINGCLI_IMAGE:-ghcr.io/osindex/tradingagents-cli:cli}
    build:
      context: .
      dockerfile: TradingWeb/Dockerfile
      target: cli
    # The CLI image's default command is the interactive TUI (`tradingagents`),
    # which aborts immediately under compose because there is no TTY/stdin
    # ("Input is not a terminal (fd=0). Aborted."), and `restart: unless-stopped`
    # then turns that abort into a crash loop. In mix mode this container is a
    # companion that only needs to stay alive so it can share data volumes with
    # the web service, so we override the command to idle instead of launching
    # the wizard. Run the interactive CLI on demand with:
    #   docker compose -f docker-compose.mix.yml run --rm -it tradingcli tradingagents
    command: ["tail", "-f", "/dev/null"]
    env_file:
      - path: .env
        required: false
    environment:
      TRADINGWEB_DB_PATH: /home/appuser/.tradingweb/tradingweb.db
      TRADINGAGENTS_MEMORY_LOG_PATH: /home/appuser/.tradingweb/memory/shared/trading_memory.md
      TRADINGAGENTS_CHECKPOINT_DIR: /home/appuser/.tradingweb/checkpoints
    volumes:
      - tradingweb_data:/home/appuser/.tradingweb
      - tradingagents_data:/home/appuser/.tradingagents
    restart: unless-stopped
    networks:
      - web-shared

  tradingweb:
    image: ${TRADINGWEB_IMAGE:-ghcr.io/osindex/tradingagents-tradingweb:main}
    build:
      context: .
      dockerfile: TradingWeb/Dockerfile
      target: web
    env_file:
      - path: .env
        required: false
    environment:
      TRADINGWEB_USERS: ${TRADINGWEB_USERS:-admin:admin}
      TRADINGWEB_SECRET: ${TRADINGWEB_SECRET:-change-me-in-production}
      TRADINGWEB_DB_PATH: /home/appuser/.tradingweb/tradingweb.db
      # Web can share the same top-level volume; per-user files are segregated by path.
      TRADINGWEB_MEMORY_ROOT: /home/appuser/.tradingweb/memory
      TRADINGWEB_CHECKPOINT_ROOT: /home/appuser/.tradingweb/checkpoints
      # Use the CLI service as a logical companion container for future IPC/runner work.
      TRADINGWEB_CLI_SERVICE: tradingcli
    ports:
      - "8731:8731"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - tradingweb_data:/home/appuser/.tradingweb
      - tradingagents_data:/home/appuser/.tradingagents
    restart: unless-stopped
    networks:
      - web-shared

volumes:
  tradingweb_data:
  tradingagents_data:

networks:
  web-shared:
    external: true
    name: ${TRADINGWEB_NETWORK:-bridge}
