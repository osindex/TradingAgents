services:
  tradingcli:
    image: ${TRADINGCLI_IMAGE:-ghcr.io/osindex/tradingagents-cli:cli}
    build:
      context: .
      dockerfile: TradingWeb/Dockerfile
      target: cli
    env_file:
      - path: .env
        required: false
    environment:
      TRADINGWEB_DB_PATH: /home/appuser/.tradingweb/tradingweb.db
      TRADINGAGENTS_MEMORY_LOG_PATH: /home/appuser/.tradingweb/memory/shared/trading_memory.md
      TRADINGAGENTS_CHECKPOINT_DIR: /home/appuser/.tradingweb/checkpoints
    volumes:
      - tradingweb_data:/home/appuser/.tradingweb
      - tradingagents_data:/home/appuser/.tradingagents
    restart: unless-stopped

  tradingweb:
    image: ${TRADINGWEB_IMAGE:-ghcr.io/osindex/tradingagents-tradingweb:main}
    build:
      context: .
      dockerfile: TradingWeb/Dockerfile
      target: web
    env_file:
      - path: .env
        required: false
    environment:
      TRADINGWEB_USERS: ${TRADINGWEB_USERS:-admin:admin}
      TRADINGWEB_SECRET: ${TRADINGWEB_SECRET:-change-me-in-production}
      TRADINGWEB_DB_PATH: /home/appuser/.tradingweb/tradingweb.db
      # Web can share the same top-level volume; per-user files are segregated by path.
      TRADINGWEB_MEMORY_ROOT: /home/appuser/.tradingweb/memory
      TRADINGWEB_CHECKPOINT_ROOT: /home/appuser/.tradingweb/checkpoints
      # Use the CLI service as a logical companion container for future IPC/runner work.
      TRADINGWEB_CLI_SERVICE: tradingcli
    ports:
      - "8731:8731"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - tradingweb_data:/home/appuser/.tradingweb
      - tradingagents_data:/home/appuser/.tradingagents
    restart: unless-stopped

volumes:
  tradingweb_data:
  tradingagents_data:
